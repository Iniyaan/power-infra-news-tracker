name: Daily News Website Update

on:
  schedule:
    # 09:30 UTC = 3:00 PM IST (India Standard Time)
    - cron: "30 9 * * *"
  workflow_dispatch:
    # Lets you manually trigger a run from the GitHub Actions tab, for testing

permissions:
  contents: write   # needed so the workflow can commit index.html back to the repo

jobs:
  update-news-page:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run news notifier script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_notifier.py

      - name: Commit updated website page
        run: |
          git config user.name "news-notifier-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Update daily news page"
          git push
